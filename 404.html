<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Page Not Found</title>
  <link rel="stylesheet" href="404.css">
</head>
<body>

  <div class="bg"></div>

  <section class="error-page">
    <div class="error-card">
      <div class="dots">
        <span></span><span></span><span></span>
      </div>

      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>
        Looks like you’ve drifted into the void. The page you’re searching
        for isn’t here anymore — but we can guide you back to something great.
      </p>

      <div class="buttons">
        <button onclick="goHome()">Go Home</button>
        <button class="outline" onclick="goBack()">Go Back</button>
      </div>
    </div>
  </section>

  <script src="404.js"></script>
</body>
</html>
